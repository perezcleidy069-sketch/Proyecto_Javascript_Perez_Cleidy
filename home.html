<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="./CSS/estiloSecond.css">
</head>
<body>
    <header id="encabezado">
        <div class="encabezado__div">
            <div class="div__logo">
                <img src="./IMG/log.png" alt="Logo del parqueadero" class="logo">
                <h2 class="nombre__parqueo">CampusParking</h2>
            </div>
            <div class="nav__perfil">
                <a href="./perfil.html"><img src="./IMG/perfil.png" alt="Icono de perfil" class="perfil"></a>
            </div>
        </div>
        <nav id="encabezado__nav">
            <button class="nav__boton"><a href="./Registrar.html"></a> 📝 Registrar</button>
            <button class="nav__boton"><a href="./historial.html"></a> 🧾 Historial</button>
            <button class="nav__boton"><a href="./EspacioDisponibles.html"></a>📍 Lugar del parqueo</button>
            <button class="nav__boton"><a href="./marcasVehiculos.html"></a> 🚛 Marcas</button>
        </nav>
    </header>
    <main>
        <section>
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>Tipo de vehiculos</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Carro</td>
                            <td>$10.00</td>
                        </tr>
                        <tr>
                            <td>motocicleta</td>
                            <td>$8.00</td>
                        </tr>
                        <tr>
                            <td>Bicicleta</td>
                            <td>$6.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
        <section>
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>Tipo de Vehículo</th>
                            <th>Marca / Modelo</th>
                            <th>Porcentaje</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Carros -->
                        <tr>
                            <td rowspan="3" class="categoria">Carros (Aston Martin)</td>
                            <td>V8 Vantage</td>
                            <td>15%</td>
                        </tr>
                        <tr>
                            <td>DBS</td>
                            <td>15%</td>
                        </tr>
                        <tr>
                            <td>DB9</td>
                            <td>15%</td>
                        </tr>
            
                        <!-- Motos -->
                        <tr>
                            <td rowspan="3" class="categoria">Motos</td>
                            <td>Yamaha</td>
                            <td>10%</td>
                        </tr>
                        <tr>
                            <td>Honda</td>
                            <td>10%</td>
                        </tr>
                        <tr>
                            <td>Suzuki</td>
                            <td>10%</td>
                        </tr>
            
                        <!-- Bicicletas -->
                        <tr>
                            <td rowspan="3" class="categoria">Bicicletas</td>
                            <td>Trek</td>
                            <td>5%</td>
                        </tr>
                        <tr>
                            <td>Scott</td>
                            <td>5%</td>
                        </tr>
                        <tr>
                            <td>Orbea</td>
                            <td>5%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
   
    </main>

</html>
