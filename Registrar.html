<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar vehículo</title>
    <link rel="stylesheet" href="./CSS/style.css">

</head>
<body>
    <header  class="head">
        <div class="div__logo">
            <img src="./IMG/log.png" alt="Logo del parqueadero" class="logo">
            <h2 class="nombre__parqueo">CampusParking</h2>
        </div>
        <div class="head__d">
            <a href="./home.html"><img src="./IMG/regresar.png" alt="Flecha para regresar" class="Flecha"></a>
            <div>
                <p>Vacíos: <span id="vacios">30</span></p>
             
                <p>Ocupados: <span id="ocupados">0</span></p>
            </div>
            <div>
                <a href="./historial.html"><button>Ver</button></a>
            </div>
        </div>

    </header><hr>
    <main class="main">
        <form id="formulario">
            <h2 class="texto">Registro del vehículo</h2>
            <label for="text">Nombre del propetario:</label><br>
            <input type="text" id="propetario" required><br>
            <label for="text">Seleccion el tipo de vehículo:</label><br>
            
            <select id="car" required>
                <option value="">Selecione..</option>
                <option value="carro" data-prefix="ABC"="">Carro</option>
                <option value="moto"data-prefix="MT">Moto</option>
                <option value="bicicleta"data-prefix="B"="">Bicicleta</option>
            </select><br>

            <label for="text">Placa del vehículo:</label><br>
            <div class="estilo__div" >
                <b id="placaFija" style="min-width: 40px;">---</b>
                <input type="text" id="place" maxlength="5" required id="lugar"><br>
            </div>

            <label for="text" >Fecha que ingresa:</label><br>
            <input type="text"  id="fecha"><br>
            <label for="text">Hora de entrada:</label><br>
            <input type="text" id="hora"><br>

            <div>
                <label for="text">Asignar un lugar</label><br>
                <input type="number" min="1" max="30" id="lugar">

            </div>
            <input type="hidden" id="lugarOculto">
            <input type="hidden" id="marcaOculta">
            <button type="submit">Guadar</button>
        </form>
        <div class="main__div">
            
            
            <section class="seccion1" id="carro">
                <h2 class="subtitulo">Lugar de parqueo</h2>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">1</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">2</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">3</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">4</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">5</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">6</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">7</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">8</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">9</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">10</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">11</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">12</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">13</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">14</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">15</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">16</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">17</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">18</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">19</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">20</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">21</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">22</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">23</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">24</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">25</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">26</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">27</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">28</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">29</button>
                <button id="boton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">30</button>
            </section>
        </div>
    </main>
    <script src="./javascripts/registar.js"></script>
</body>
</html>
