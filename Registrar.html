<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar vehículo</title>
    <link rel="stylesheet" href="./CSS/style.css">

</head>
<body>
    <header id="header">
        <div class="div__logo">
            <img src="./IMG/log.png" alt="Logo del parqueadero" class="logo">
            <h2 class="nombre__parqueo">CampusParking</h2>
        </div>
        <div class="head__div">
            <a href="./index.html"><img src="./IMG/regresar.png" alt="Flecha para regresar" class="Flecha"></a>
            <div id="conteo-info">
                <p>Vacíos: <span id="total-vacios">30</span></p>
                <p>Ocupados: <span id="total-ocupados">0</span></p>
            </div>
        </div>
    </header><hr>
    <main class="main">
        <form id="formulario">
            <h2 class="texto">Registro del vehículo</h2>
            <label for="text">Nombre del propetario:</label><br>
            <input type="text" id="propetario" required><br>
            <label for="text">Seleccion el tipo de vehículo:</label><br>
            
            <select id="car" required>
                <option value="">Selecione..</option>
                <option value="option1" data-prefix="ABC"="">Carro</option>
                <option value="option2" data-prefix="MT">Moto</option>
                <option value="option3" data-prefix="B"="">Bicicleta</option>
            </select><br>

            <label for="text">Placa del vehículo:</label><br>
            <div class="estilo__div" >
                <b id="placaFija" style="min-width: 40px;">---</b>
                <input type="text" id="place" maxlength="5" required id="lugar"><br>
            </div>

            <label for="text" >Fecha que ingresa:</label><br>
            <input type="date"  id="fecha" required><br>
            <label for="text">Hora de entrada:</label><br>
            <input type="time" id="hora" required><br>

            <div>
                <label for="text">Asignar un lugar</label><br>
                <input type="number" min="1" max="30" id="lugar">

            </div>
            <input type="hidden" id="lugarOculto">
            <input type="hidden" id="marcaOculta">
            <button type="submit">Guadar</button>
            <button class="boto" id="botons">Mostrar</button>
        </form>
        <div class="main__div">
            
            <section class="seccion1" id="carro">
                <h2 class="subtitulo">Lugar de parqueo</h2>
                <button id="boton"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">C-1</button>
                <button id="boton"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">C-2</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">C-3</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">C-4</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">C-5</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">C-6</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">C-7</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">C-8</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">C-9</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">C-10</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">M-1</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">M-2</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">M-3</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">M-4</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">M-5</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">M-6</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">M-7</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">M-8</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">M-9</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">M-10</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">B-1</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">B-2</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">B-3</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">B-4</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">B-5</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">B-6</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">B-7</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">B-8</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">B-9</button>
                <button id="buton" class="slot"><img src="./IMG/carro.png" alt="Icono de un carro" class="vehiculo">B-10</button>
            </section>
        </div>
    </main>
    <script src="./javascripts/registar.js"></script>
</body>
</html>
